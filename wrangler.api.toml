name = "ideapilot-api"
main = "worker/index.ts"
compatibility_date = "2024-11-01"

[[routes]]
pattern = "api.bige.life"
custom_domain = true

[vars]
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-v4-flash"
ALLOWED_ORIGINS = "http://localhost:5173,https://ideapilot.pages.dev,https://bige.life,https://www.bige.life"
APP_ENV = "production"
SITE_URL = "https://bige.life"
API_BASE_URL = "https://api.bige.life"

[env.staging.vars]
APP_ENV = "staging"
ALLOWED_ORIGINS = "https://staging.ideapilot-web.pages.dev"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-v4-flash"
SITE_URL = "https://staging.ideapilot-web.pages.dev"
API_BASE_URL = "https://ideapilot-api-staging.348421501.workers.dev"
